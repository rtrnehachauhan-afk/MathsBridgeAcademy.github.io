<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathsBridge Academy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0e0e1f;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(127,119,221,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(127,119,221,.07) 1px,transparent 1px);background-size:40px 40px}
.bg-glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(60,52,137,.35) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%)}

.card{position:relative;z-index:1;background:#1a1a3e;border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(127,119,221,.2)}

.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#3C3489,#7F77DD);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px}
.logo-title{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.01em}
.logo-sub{font-size:12px;color:#AFA9EC;margin-top:4px;letter-spacing:.06em;text-transform:uppercase}

.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:#AFA9EC;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.field input{width:100%;background:#0e0e1f;border:2px solid rgba(127,119,221,.25);border-radius:10px;padding:12px 16px;font-size:14px;color:#fff;outline:none;transition:border-color .15s}
.field input:focus{border-color:#7F77DD}
.field input::placeholder{color:#555}

.err{background:#FCEBEB;color:#791F1F;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;margin-bottom:16px;display:none}
.err.show{display:block}

.btn{width:100%;padding:13px;background:linear-gradient(135deg,#3C3489,#7F77DD);border:none;border-radius:10px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;transition:opacity .15s;margin-top:4px}
.btn:hover{opacity:.88}

.footer{text-align:center;margin-top:24px;font-size:11px;color:#555}
</style>
</head>
<body>
<div class="bg"><div class="bg-grid"></div><div class="bg-glow"></div></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">∑</div>
    <div class="logo-title">MathsBridge Academy</div>
    <div class="logo-sub">Student Portal</div>
  </div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="uname" placeholder="Enter your username" autocomplete="off">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="pwd" placeholder="Enter your password" onkeydown="if(event.key==='Enter')login()">
  </div>

  <div class="err" id="err">Incorrect username or password. Please try again.</div>
  <button class="btn" onclick="login()">Login →</button>

  <div class="footer">MathsBridge Academy · ICSE & CBSE · Class 8–10</div>
</div>

<script>

function login(){
  const u = document.getElementById('uname').value.trim().toLowerCase();
  const p = document.getElementById('pwd').value.trim();
  const err = document.getElementById('err');
  const s = STUDENTS[u];
  if(s && s.pwd === p){
    err.classList.remove('show');
    sessionStorage.setItem('mba_user', JSON.stringify({username:u, name:s.name, board:s.board, cls:s.cls}));
    window.location.href = 'dashboard.html';
  } else {
    err.classList.add('show');
    document.getElementById('pwd').value = '';
  }
}
</script>
</body>
</html>
