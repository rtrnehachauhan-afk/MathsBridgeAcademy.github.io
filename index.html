<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathsBridge Academy — Student Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F5F0E8;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-pattern{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(45,90,61,.06) 1px,transparent 1px);background-size:28px 28px}
.bg-glow{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(45,90,61,.08) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%)}

.card{position:relative;z-index:1;background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(45,90,61,.12),0 0 0 1px rgba(45,90,61,.1)}

.logo{text-align:center;margin-bottom:32px}
.logo img{width:140px;height:auto;margin-bottom:12px}
.logo-sub{font-size:11px;color:#2D5A3D;margin-top:2px;letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.logo-tagline{font-size:12px;color:#888;margin-top:5px;font-style:italic}

.divider{height:2px;background:linear-gradient(90deg,transparent,#C9A84C,transparent);margin-bottom:28px}

.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:#2D5A3D;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.field input{width:100%;background:#F5F0E8;border:2px solid rgba(45,90,61,.2);border-radius:10px;padding:12px 16px;font-size:14px;color:#1a1a1a;outline:none;transition:border-color .15s}
.field input:focus{border-color:#2D5A3D}
.field input::placeholder{color:#aaa}

.err{background:#FFF0F0;color:#8B0000;border:1px solid #ffcccc;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;margin-bottom:16px;display:none}
.err.show{display:block}

.btn{width:100%;padding:13px;background:#2D5A3D;border:none;border-radius:10px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;transition:all .15s;margin-top:4px;letter-spacing:.02em}
.btn:hover{background:#1e3d2a;box-shadow:0 4px 16px rgba(45,90,61,.3)}

.footer{text-align:center;margin-top:20px;font-size:11px;color:#aaa}
.footer span{color:#C9A84C;font-weight:600}
</style>
</head>
<body>
<div class="bg"><div class="bg-pattern"></div><div class="bg-glow"></div></div>

<div class="card">
  <div class="logo">
    <img src="main_logo.png" alt="MathsBridge Academy">
    <div class="logo-sub">Student Portal</div>
    <div class="logo-tagline">Mentored by Neha Ma'am</div>
  </div>
  <div class="divider"></div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="uname" placeholder="Enter your username" autocomplete="off">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="pwd" placeholder="Enter your password" onkeydown="if(event.key==='Enter')login()">
  </div>

  <div class="err" id="err">Incorrect username or password. Please try again.</div>
  <button class="btn" onclick="login()">Login →</button>

  <div class="footer">MathsBridge Academy &nbsp;·&nbsp; <span>ICSE & CBSE</span> &nbsp;·&nbsp; Class 8–10</div>
</div>

function login(){
  const u=document.getElementById('uname').value.trim().toLowerCase();
  const p=document.getElementById('pwd').value.trim();
  const err=document.getElementById('err');
  const s=STUDENTS[u];
  if(s && s.pwd===p){
    err.classList.remove('show');
    sessionStorage.setItem('mba_user',JSON.stringify({username:u,name:s.name,board:s.board,cls:s.cls}));
    window.location.href='dashboard.html';
  } else {
    err.classList.add('show');
    document.getElementById('pwd').value='';
  }
}
</script>
</body>
</html>
