<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — MathsBridge Academy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0e0e1f;color:#fff;min-height:100vh}

.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(127,119,221,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(127,119,221,.07) 1px,transparent 1px);background-size:40px 40px}

.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:24px 16px 60px}

/* TOPBAR */
.topbar{background:#1a1a3e;border-radius:14px;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;border:1px solid rgba(127,119,221,.2)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-icon{width:40px;height:40px;background:linear-gradient(135deg,#3C3489,#7F77DD);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tb-title{font-size:16px;font-weight:800;color:#fff}
.tb-sub{font-size:11px;color:#AFA9EC;margin-top:2px}
.tb-right{display:flex;align-items:center;gap:10px}
.badge-board{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px}
.badge-icse{background:#E1F5EE;color:#085041}
.badge-cbse{background:#FAEEDA;color:#633806}
.badge-cls{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;background:#EEEDFE;color:#3C3489}
.logout-btn{font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;border:2px solid rgba(127,119,221,.3);background:transparent;color:#AFA9EC;cursor:pointer;transition:all .15s}
.logout-btn:hover{border-color:#E24B4A;color:#E24B4A}

/* WELCOME */
.welcome{background:linear-gradient(135deg,#1a1a3e,#252550);border-radius:14px;padding:20px 24px;margin-bottom:20px;border:1px solid rgba(127,119,221,.15)}
.welcome-name{font-size:20px;font-weight:800;color:#fff;margin-bottom:4px}
.welcome-sub{font-size:13px;color:#AFA9EC}

/* SECTION HEADER */
.sec-head{font-size:11px;font-weight:800;color:#AFA9EC;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;padding-left:2px}

/* CHAPTER GRID */
.chapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:24px}

.ch-card{background:#1a1a3e;border-radius:12px;overflow:hidden;border:1px solid rgba(127,119,221,.15);transition:transform .15s,box-shadow .15s;cursor:pointer;text-decoration:none;display:block}
.ch-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(60,52,137,.4)}
.ch-stripe{height:4px}
.ch-stripe.s-ci{background:linear-gradient(90deg,#1D9E75,#5DCAA5)}
.ch-stripe.s-fact{background:linear-gradient(90deg,#3C3489,#7F77DD)}
.ch-stripe.s-trig{background:linear-gradient(90deg,#BA7517,#EF9F27)}
.ch-stripe.s-coord{background:linear-gradient(90deg,#C0392B,#E74C3C)}
.ch-stripe.s-quad{background:linear-gradient(90deg,#8E44AD,#BB8FCE)}
.ch-stripe.s-alg{background:linear-gradient(90deg,#2471A3,#5DADE2)}
.ch-stripe.s-mat{background:linear-gradient(90deg,#117A65,#48C9B0)}
.ch-stripe.s-lock{background:linear-gradient(90deg,#555,#888)}

.ch-body{padding:16px 18px}
.ch-num{font-size:10px;font-weight:700;color:#AFA9EC;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.ch-name{font-size:14px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:8px}
.ch-meta{display:flex;align-items:center;gap:6px}
.ch-pill{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;background:#252550;color:#AFA9EC}
.ch-lock{font-size:11px;color:#555;margin-left:auto}

.empty-note{text-align:center;padding:30px;color:#555;font-size:13px;background:#1a1a3e;border-radius:12px;border:1px dashed rgba(127,119,221,.2)}
</style>
</head>
<body>
<div class="bg"><div class="bg-grid"></div></div>
<div class="wrap">

  <div class="topbar">
    <div class="tb-left">
      <div class="tb-icon">∑</div>
      <div>
        <div class="tb-title">MathsBridge Academy</div>
        <div class="tb-sub">Student Portal</div>
      </div>
    </div>
    <div class="tb-right">
      <span class="badge-board" id="badge-board"></span>
      <span class="badge-cls" id="badge-cls"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="welcome">
    <div class="welcome-name" id="welcome-name">Welcome back!</div>
    <div class="welcome-sub" id="welcome-sub"></div>
  </div>

  <div class="sec-head">Your Chapters</div>
  <div class="chapter-grid" id="chapter-grid"></div>

</div>

<script>
// ── CONTENT MAP ──────────────────────────────────────────────
// Add new HTML files here as you build them.
// file: null = coming soon (locked card)
const CONTENT = {
  ICSE: {
    VIII: [
      { num:"Ch 1", name:"Rational Numbers",         stripe:"s-alg",   file:null },
      { num:"Ch 2", name:"Squares & Square Roots",   stripe:"s-ci",    file:null },
      { num:"Ch 3", name:"Cubes & Cube Roots",       stripe:"s-fact",  file:null },
    ],
    IX: [
      { num:"Ch 2", name:"Compound Interest",        stripe:"s-ci",    file:"rs_aggarwal_ci_class9.html" },
      { num:"Ch 4", name:"Factorisation",            stripe:"s-fact",  file:null },
      { num:"Ch 5", name:"Quadratic Equations",      stripe:"s-quad",  file:null },
      { num:"Ch 6", name:"Coordinate Geometry",      stripe:"s-coord", file:null },
      { num:"Ch 7", name:"Trigonometry",             stripe:"s-trig",  file:null },
    ],
    X: [
      { num:"Ch 1", name:"Compound Interest",        stripe:"s-ci",    file:null },
      { num:"Ch 2", name:"Quadratic Equations",      stripe:"s-quad",  file:null },
      { num:"Ch 3", name:"Coordinate Geometry",      stripe:"s-coord", file:null },
      { num:"Ch 4", name:"Trigonometric Identities", stripe:"s-trig",  file:null },
      { num:"Ch 5", name:"Matrices",                 stripe:"s-mat",   file:null },
    ],
  },
  CBSE: {
    VIII: [
      { num:"Ch 1", name:"Rational Numbers",         stripe:"s-alg",   file:null },
      { num:"Ch 2", name:"Linear Equations",         stripe:"s-ci",    file:null },
    ],
    IX: [
      { num:"Ch 1", name:"Number Systems",           stripe:"s-alg",   file:null },
      { num:"Ch 2", name:"Polynomials",              stripe:"s-fact",  file:null },
      { num:"Ch 3", name:"Coordinate Geometry",      stripe:"s-coord", file:null },
      { num:"Ch 4", name:"Linear Equations",         stripe:"s-ci",    file:null },
      { num:"Ch 6", name:"Triangles",                stripe:"s-trig",  file:null },
    ],
    X: [
      { num:"Ch 1", name:"Real Numbers",             stripe:"s-alg",   file:null },
      { num:"Ch 2", name:"Polynomials",              stripe:"s-fact",  file:null },
      { num:"Ch 3", name:"Quadratic Equations",      stripe:"s-quad",  file:null },
      { num:"Ch 4", name:"Arithmetic Progressions",  stripe:"s-ci",    file:null },
      { num:"Ch 8", name:"Trigonometry",             stripe:"s-trig",  file:null },
    ],
  },
};

// ── AUTH CHECK ───────────────────────────────────────────────
const raw = sessionStorage.getItem('mba_user');
if(!raw){ window.location.href='index.html'; }
const user = JSON.parse(raw);

// ── POPULATE UI ──────────────────────────────────────────────
document.getElementById('welcome-name').textContent = 'Welcome, ' + user.name + '!';
document.getElementById('welcome-sub').textContent  = user.board + ' · Class ' + user.cls + ' · MathsBridge Academy';

const bb = document.getElementById('badge-board');
bb.textContent = user.board;
bb.className   = 'badge-board ' + (user.board==='ICSE'?'badge-icse':'badge-cbse');
document.getElementById('badge-cls').textContent = 'Class ' + user.cls;

const chapters = (CONTENT[user.board] || {})[user.cls] || [];
const grid = document.getElementById('chapter-grid');

if(!chapters.length){
  grid.innerHTML = '<div class="empty-note">No content available yet for your class. Check back soon!</div>';
} else {
  chapters.forEach(ch => {
    const locked = !ch.file;
    const card = document.createElement('a');
    card.className = 'ch-card';
    if(!locked){
      card.href = ch.file;
    } else {
      card.href = '#';
      card.onclick = e => e.preventDefault();
    }
    card.innerHTML = `
      <div class="ch-stripe ${locked?'s-lock':ch.stripe}"></div>
      <div class="ch-body">
        <div class="ch-num">${ch.num}</div>
        <div class="ch-name">${ch.name}</div>
        <div class="ch-meta">
          <span class="ch-pill">${user.board}</span>
          <span class="ch-pill">Class ${user.cls}</span>
          ${locked ? '<span class="ch-lock">🔒 Coming soon</span>' : '<span class="ch-lock" style="color:#5DCAA5;margin-left:auto">✓ Available</span>'}
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function logout(){
  sessionStorage.removeItem('mba_user');
  window.location.href='index.html';
}
</script>
</body>
</html>
