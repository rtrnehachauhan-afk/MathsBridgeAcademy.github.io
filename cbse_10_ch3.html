<html lang="en">
<head>

<title>Chapter 3 — Pair of Linear Equations in Two Variables | Maths Bridge Academy</title>

<style>
:root{
  --page:#F5F0E8; --card:#FFFDF8; --green:#1A3D28; --green2:#2D5A3D;
  --gold:#C9A84C; --gold2:#E8C56A; --la:#1A3050; --text:#22201B;
  --amber:#7A5C00; --amberbg:#FFF8DC; --red:#B03030;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--page);color:var(--text);font-family:'Crimson Pro',serif;font-size:20px;line-height:1.6;padding:0 0 80px}
.wrap{max-width:1080px;margin:0 auto;padding:0 18px}

header.top{background:var(--green);color:#F5F0E8;padding:34px 0 30px;border-bottom:5px solid var(--gold)}
header.top h1{font-family:'Playfair Display',serif;font-weight:800;font-size:38px;line-height:1.2}
header.top .sub{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--gold2);margin-bottom:8px}
header.top .meta{font-size:17px;color:#CFE0D4;margin-top:8px}

.ctabs{display:flex;flex-wrap:wrap;gap:8px;margin:26px 0 18px}
.ctab{font-family:'Playfair Display',serif;font-weight:700;font-size:16px;padding:11px 18px;border:2px solid var(--green);background:transparent;color:var(--green);border-radius:3px;cursor:pointer}
.ctab.active{background:var(--green);color:#F5F0E8}

.sec-tabs{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 10px;border-bottom:2px solid #DED5C4;padding-bottom:10px}
.sec-tab{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.5px;padding:8px 13px;border:1.5px solid #C4B79B;background:var(--card);color:#5A5240;border-radius:3px;cursor:pointer}
.sec-tab.active{background:var(--gold);border-color:var(--gold);color:#2B2308}

.filter-bar{display:flex;gap:6px;margin:12px 0 20px;align-items:center}
.filter-bar .fl{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;color:#8A8067;text-transform:uppercase;margin-right:4px}
.filter-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:6px 12px;border:1.5px solid #C4B79B;background:transparent;color:#5A5240;border-radius:20px;cursor:pointer}
.filter-btn.active{background:var(--green2);border-color:var(--green2);color:#fff}

.sec-panel{display:none}
.sec-panel.active{display:block}
.cpanel{display:none}
.cpanel.active{display:block}

.qcard{display:flex;background:var(--card);border:1px solid #E2D9C6;border-radius:5px;margin-bottom:20px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.qcard-stripe{width:7px;flex:0 0 7px;background:linear-gradient(180deg,#2D5A3D,#4A8A5D)}
.qcard.q-ar .qcard-stripe{background:#7B5EA7}
.qcard.q-3m .qcard-stripe,.qcard.q-5m .qcard-stripe{background:linear-gradient(180deg,#1A3050,#5B9FE0)}
.qcard.q-cb .qcard-stripe{background:linear-gradient(180deg,#0D2B4E,#2563A8)}
.qcard-body{flex:1;padding:20px 22px}

.badge-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.6px;padding:4px 9px;border-radius:3px;text-transform:uppercase}
.b-src{background:#EAF1EB;color:var(--green);border:1px solid #C8DCCD}
.b-marks{background:#F0EAD8;color:#6B5A22;border:1px solid #DCCFA6}
.b-pyq{background:#FFF1D6;color:#8A6A12;border:1px solid #E8CE8E}
.b-easy{background:#E6F2E9;color:#2D5A3D;border:1px solid #BEDCC6}
.b-med{background:#FFF3D9;color:#8A6A12;border:1px solid #E8CE8E}
.b-hard{background:#FBE6E6;color:var(--red);border:1px solid #EDC2C2}
.b-star{background:var(--gold);color:#2B2308;border:1px solid #B79736}
.qno{font-family:'JetBrains Mono',monospace;font-size:11px;color:#9A9078;margin-left:auto}

.qt{font-size:20px;line-height:1.65;margin-bottom:6px}
.qt b{font-weight:700}
.eqblock{font-family:'JetBrains Mono',monospace;font-size:16px;line-height:2;margin:8px 0 4px 4px}

.mcq-opts{list-style:none;margin-top:12px}
.mopt{border:1.5px solid #E0D7C4;background:#FFFDF8;border-radius:4px;padding:9px 14px;margin-bottom:7px;cursor:pointer;font-size:18px;display:flex;gap:10px;align-items:baseline}
.mopt .lab{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#8A8067}
.mopt.correct{background:#E6F2E9;border-color:#2D5A3D}
.mopt.correct .lab{color:#2D5A3D}
.mopt.wrong{background:var(--amberbg);border-color:#C9A84C;color:var(--amber)}
.mopt.wrong .lab{color:var(--amber)}
.mopt.locked{cursor:default}

.ar-stem{margin:10px 0}
.ar-stem .ar-a,.ar-stem .ar-r{padding:9px 13px;border-left:3px solid #7B5EA7;background:#F4F1FA;margin-bottom:7px;font-size:18px}

.sol-toggle{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.5px;margin-top:14px;padding:8px 16px;border:1.5px solid var(--green2);background:transparent;color:var(--green2);border-radius:3px;cursor:pointer}
.sol-toggle:hover{background:var(--green2);color:#fff}
.rep-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.5px;margin-top:14px;margin-left:8px;padding:8px 16px;border:1.5px solid #C4B79B;background:transparent;color:#8A8067;border-radius:3px;cursor:pointer}
.rep-btn:hover{background:#EFE8DA}

.sol-box{display:none;margin-top:16px;border-top:2px dashed #DED5C4;padding-top:16px}
.sol-box.open{display:block}
.sol-h{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:7px}
.sol-given{background:#EEF7F0;border:1px solid #C8DCCD;border-radius:4px;padding:12px 15px;margin-bottom:12px}
.sol-given .sol-h{color:var(--green2)}
.sol-given .g{font-size:18px;line-height:1.85}
.sol-formula{background:#FFF8E6;border:1px solid #E8CE8E;border-radius:4px;padding:12px 15px;margin-bottom:12px}
.sol-formula .sol-h{color:#8A6A12}
.sol-formula .fml{font-family:'JetBrains Mono',monospace;font-size:15px;line-height:1.95}
.sol-work{background:#FFFDF8;border:1px solid #E2D9C6;border-radius:4px;padding:12px 15px;margin-bottom:12px}
.sol-work .sol-h{color:#5A5240}
.sol-work .k{font-family:'JetBrains Mono',monospace;font-size:15px;line-height:1.9;color:var(--green)}
.sol-work .say{font-family:'Crimson Pro',serif;font-size:18px;color:#4A4335;line-height:1.7;margin:5px 0}
.sol-work .hint{color:#888;font-size:13px;font-family:'Crimson Pro',serif}
.sol-answer{background:var(--green);border-radius:4px;padding:12px 15px}
.sol-answer .sol-h{color:var(--gold2)}
.sol-answer .a{color:#F1EADA;font-size:19px;line-height:1.6}
.q-5m .sol-answer{background:var(--la)}

.gtbl-block{margin:12px 0}
.gtbl-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:#8A6A12;margin-bottom:5px}
.gtbl{border-collapse:collapse;margin-bottom:10px;font-family:'JetBrains Mono',monospace;font-size:14px}
.gtbl td,.gtbl th{border:1.5px solid var(--gold);padding:6px 14px;text-align:center;background:#FFFDF8}
.gtbl th{background:#FFF8E6;font-weight:700}
.gsvg{background:#FFFDF8;border:1px solid #E2D9C6;border-radius:4px;margin:10px 0;max-width:100%}

.cbstem{background:#F2F6FB;border:1px solid #C9D9EC;border-radius:4px;padding:14px 16px;margin-bottom:12px;font-size:19px;line-height:1.65}
.cbpart{border-left:3px solid #2563A8;padding-left:13px;margin-bottom:14px}
.cbpart .cbq{font-size:19px;margin-bottom:4px}
.cbmk{font-family:'JetBrains Mono',monospace;font-size:11px;color:#8A8067}

.fr{display:inline-flex;flex-direction:column;vertical-align:middle;text-align:center;margin:0 3px;transform:translateY(-0.05em)}
.fr .fn{color:inherit;border-bottom:1.5px solid currentColor;margin:0;padding:0 4px;line-height:1.15;font-weight:inherit}
.fr .fd{color:inherit;margin:0;padding:0 4px;line-height:1.15;font-weight:inherit}

.formula-card{background:var(--card);border:1px solid #E2D9C6;border-radius:5px;margin-bottom:12px;overflow:hidden}
.formula-header{font-family:'Playfair Display',serif;font-weight:700;font-size:19px;padding:14px 18px;background:#EEF7F0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:var(--green)}
.formula-body{display:none;padding:16px 18px;border-top:1px solid #E2D9C6}
.formula-body.open{display:block}
.formula-body .fml{font-family:'JetBrains Mono',monospace;font-size:15px;line-height:2.1;color:var(--green)}
.formula-body .note{font-family:'Crimson Pro',serif;font-size:18px;color:#4A4335;margin-top:6px}
.arrow{font-family:'JetBrains Mono',monospace;color:var(--gold)}

.empty{font-family:'JetBrains Mono',monospace;font-size:13px;color:#9A9078;padding:20px 0}

#repMask{display:none;position:fixed;inset:0;background:rgba(20,18,12,.45);z-index:99;align-items:center;justify-content:center}
#repMask.open{display:flex}
#repBox{background:var(--card);border:2px solid var(--green);border-radius:6px;padding:22px;width:min(460px,92vw)}
#repBox h3{font-family:'Playfair Display',serif;font-size:21px;color:var(--green);margin-bottom:6px}
#repBox .rm{font-family:'JetBrains Mono',monospace;font-size:11px;color:#8A8067;margin-bottom:10px}
#repBox textarea{width:100%;height:96px;font-family:'Crimson Pro',serif;font-size:17px;padding:9px;border:1.5px solid #C4B79B;border-radius:4px;background:#FFFDF8;resize:vertical}
#repBox .btns{display:flex;gap:8px;margin-top:12px}
#repBox button{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:8px 16px;border-radius:3px;cursor:pointer;border:1.5px solid var(--green2)}
#repSend{background:var(--green2);color:#fff}
#repCancel{background:transparent;color:#5A5240;border-color:#C4B79B}
#repMsg{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--green2);margin-top:8px}
</style>
</head>

   '~Check equation (ii):', F('a<sup>2</sup>','a<sup>2</sup>')+' + '+F('b<sup>2</sup>','b<sup>2</sup>')+' = 1 + 1 = 2',
   '&there4; equation (ii) is also satisfied.'],
 answer:'&there4; x = a&sup2;, y = b&sup2;.'},

{c:'c2', src:'Exemplar Ex 3.3 · Q10', marks:'3 Marks · SA', diff:'h', star:true,
 q:'Find the solution of the pair of equations '+F('x','10')+' + '+F('y','5')+' &minus; 1 = 0 and '+F('x','8')+' + '+F('y','6')+' = 15. Hence, find &lambda;, if y = &lambda;x + 5.',
 given:['Equation (i): '+F('x','10')+' + '+F('y','5')+' &minus; 1 = 0','Equation (ii): '+F('x','8')+' + '+F('y','6')+' = 15'],
 formula:['Taking LCM = 10 in equation (i), and LCM = 24 in equation (ii).'],
 work:['~Taking LCM = 10 in equation (i):', F('x','10')+' + '+F('2y','10')+' = 1', 'x + 2y = 10 &nbsp; …(iii)',
   '~Taking LCM = 24 in equation (ii):', F('3x','24')+' + '+F('4y','24')+' = 15', '3x + 4y = 360 &nbsp; …(iv)',
   '~Multiply equation (iii) by 2:', '2x + 4y = 20 &nbsp; …(v)',
   '~Subtract equation (v) from equation (iv):', '(3x &minus; 2x) + (4y &minus; 4y) = 360 &minus; 20', '&there4; x = 340',
   '~Substituting x = 340 in equation (iii):', '340 + 2y = 10', '2y = &minus;330', '&there4; y = &minus;165',
   '~Substituting x = 340, y = &minus;165 in y = &lambda;x + 5:', '&minus;165 = &lambda;(340) + 5', '&minus;170 = 340&lambda;', '&there4; &lambda; = '+F('&minus;1','2')],
 answer:'&there4; x = 340, y = &minus;165, and &lambda; = '+F('&minus;1','2')+'.'},

{c:'c2', src:'PYQ', pyq:'2026', marks:'3 Marks · SA', diff:'m', star:true,
 q:'Prove that the system of equations 2x &minus; 3y = 7 and 4x + ky = 9 is inconsistent for k = &minus;6. Also, obtain the solution of the system if k = &minus;1.',
 given:['Equation (i): 2x &minus; 3y = 7','Equation (ii): 4x + ky = 9'],
 formula:['Inconsistent (no solution): '+F('a<sub>1</sub>','a<sub>2</sub>')+' = '+F('b<sub>1</sub>','b<sub>2</sub>')+' &ne; '+F('c<sub>1</sub>','c<sub>2</sub>')],
 work:['~Part 1 — checking k = &minus;6:', F('a<sub>1</sub>','a<sub>2</sub>')+' = '+F('2','4')+' = '+F('1','2'),
   '~With k = &minus;6, equation (ii) is 4x &minus; 6y = 9:', F('b<sub>1</sub>','b<sub>2</sub>')+' = '+F('&minus;3','&minus;6')+' = '+F('1','2'), F('c<sub>1</sub>','c<sub>2</sub>')+' = '+F('7','9'),
   '~'+F('1','2')+' = '+F('1','2')+', but this &ne; '+F('7','9'), '&there4; the system is inconsistent when k = &minus;6.',
   '~Part 2 — solving with k = &minus;1: equation (ii) becomes 4x &minus; y = 9.', 'Equation (i): 2x &minus; 3y = 7',
   '~Multiply equation (ii) by 3:', '12x &minus; 3y = 27 &nbsp; …(iii)',
   '~Subtract equation (i) from equation (iii):', '(12x &minus; 2x) + (&minus;3y &minus; (&minus;3y)) = 27 &minus; 7', '10x = 20', '&there4; x = 2',
   '~Substituting x = 2 in 4x &minus; y = 9:', '8 &minus; y = 9', '&there4; y = &minus;1'],
 answer:'&there4; The system is inconsistent for k = &minus;6; for k = &minus;1, the solution is x = 2, y = &minus;1.'},

{c:'c2', src:'PYQ', pyq:'2025', marks:'3 Marks · SA', diff:'h', star:true,
 q:'Solve the following pair of equations algebraically: 101x + 102y = 304 and 102x + 101y = 305.',
 given:['Equation (i): 101x + 102y = 304','Equation (ii): 102x + 101y = 305'],
 formula:['Add and subtract the two equations to exploit the symmetry of the coefficients.'],
 work:['~Add equation (i) and equation (ii):', '(101x + 102x) + (102y + 101y) = 304 + 305', '203x + 203y = 609',
   '~Taking 203 common:', '203(x + y) = 609', '&there4; x + y = 3 &nbsp; …(iii)',
   '~Subtract equation (i) from equation (ii):', '(102x &minus; 101x) + (101y &minus; 102y) = 305 &minus; 304', 'x &minus; y = 1 &nbsp; …(iv)',
   '~Add equation (iii) and equation (iv):', '(x + x) + (y &minus; y) = 3 + 1', '2x = 4', '&there4; x = 2',
   '~Substituting x = 2 in equation (iii):', '2 + y = 3', '&there4; y = 1'],
 answer:'&there4; x = 2, y = 1.'},

{c:'c2', src:'NCERT · Example 8', marks:'5 Marks · LA', diff:'h', star:true,
 q:'The ratio of incomes of two persons is 9 : 7 and the ratio of their expenditures is 4 : 3. If each of them manages to save &#8377;2000 per month, find their monthly incomes.',
 given:['Ratio of incomes = 9 : 7','Ratio of expenditures = 4 : 3','Savings of each = &#8377;2000 per month'],
 formula:['Let incomes = 9x and 7x. Let expenditures = 4y and 3y.','Income &minus; Expenditure = Savings'],
 work:['Equation from person 1: 9x &minus; 4y = 2000 &nbsp; …(i)', 'Equation from person 2: 7x &minus; 3y = 2000 &nbsp; …(ii)',
   '~Multiply equation (i) by 3:', '27x &minus; 12y = 6000 &nbsp; …(iii)',
   '~Multiply equation (ii) by 4:', '28x &minus; 12y = 8000 &nbsp; …(iv)',
   '~Subtract equation (iii) from equation (iv) to eliminate y:', '(28x &minus; 27x) + (&minus;12y &minus; (&minus;12y)) = 8000 &minus; 6000', '&there4; x = 2000',
   '~Substituting x = 2000 in equation (i):', '9(2000) &minus; 4y = 2000', '18000 &minus; 4y = 2000', '&minus;4y = &minus;16000', '&there4; y = 4000',

 answer:'&there4; The monthly incomes are &#8377;18,000 and &#8377;14,000.'},

{c:'c2', src:'NCERT Ex 3.2 · Q3(iii)', marks:'5 Marks · LA', diff:'m',
 q:'The coach of a cricket team buys 7 bats and 6 balls for &#8377;3800. Later, she buys 3 bats and 5 balls for &#8377;1750. Find the cost of each bat and each ball.',

 formula:['Let cost of one bat = &#8377;x, cost of one ball = &#8377;y.','7x + 6y = 3800','3x + 5y = 1750'],

{c:'c2', src:'NCERT Ex 3.2 · Q3(iv)', marks:'5 Marks · LA', diff:'m', star:true,
 q:'The taxi charges in a city consist of a fixed charge together with the charge for the distance covered. For a distance of 10 km, the charge paid is &#8377;105 and for a journey of 15 km, the charge paid is &#8377;155. What are the fixed charges and the charge per km? How much does a person have to pay for travelling a distance of 25 km?',
 given:['Fixed charge + 10 &times; (rate per km) = &#8377;105','Fixed charge + 15 &times; (rate per km) = &#8377;155'],
 formula:['Let fixed charge = &#8377;x, rate per km = &#8377;y.','x + 10y = 105','x + 15y = 155'],
 work:['~Subtract equation (i) from equation (ii) to eliminate x:', '(x &minus; x) + (15y &minus; 10y) = 155 &minus; 105', '5y = 50', '&there4; y = 10',
   '~Substituting y = 10 in equation (i):', 'x + 10(10) = 105', 'x + 100 = 105', '&there4; x = 5',
   '~Charge for 25 km:', 'x + 25y = 5 + 25(10) = 5 + 250'],
 answer:'&there4; Fixed charge = &#8377;5, rate = &#8377;10 per km, and the charge for 25 km is &#8377;255.'},

{c:'c2', src:'NCERT Ex 3.2 · Q3(v)', marks:'5 Marks · LA', diff:'h', star:true,
 q:'A fraction becomes '+F('9','11')+' if 2 is added to both the numerator and the denominator. If 3 is added to both the numerator and the denominator, it becomes '+F('5','6')+'. Find the fraction.',
 given:['Let the fraction be '+F('n','d')+'.','(n + 2)/(d + 2) = '+F('9','11'),'(n + 3)/(d + 3) = '+F('5','6')],
 formula:['Cross-multiply each condition to clear denominators.'],
 work:['~Cross-multiplying the first condition:', '11(n + 2) = 9(d + 2)', '11n + 22 = 9d + 18', '11n &minus; 9d = &minus;4 &nbsp; …(i)',
   '~Cross-multiplying the second condition:', '6(n + 3) = 5(d + 3)', '6n + 18 = 5d + 15', '6n &minus; 5d = &minus;3 &nbsp; …(ii)',
   '~Multiply equation (i) by 5 and equation (ii) by 9 to equalise the d-coefficient:', '55n &minus; 45d = &minus;20 &nbsp; …(iii)', '54n &minus; 45d = &minus;27 &nbsp; …(iv)',
   '~Subtract equation (iv) from equation (iii):', '(55n &minus; 54n) + (&minus;45d &minus; (&minus;45d)) = &minus;20 &minus; (&minus;27)', '&there4; n = 7',
   '~Substituting n = 7 in equation (ii):', '6(7) &minus; 5d = &minus;3', '42 &minus; 5d = &minus;3', '&minus;5d = &minus;45', '&there4; d = 9'],
 answer:'&there4; The fraction is '+F('7','9')+'.'},

{c:'c2', src:'NCERT · Example 5', marks:'5 Marks · LA', diff:'h', star:true,
 q:'Aftab tells his daughter, "Seven years ago, I was seven times as old as you were then. Also, three years from now, I shall be three times as old as you will be." Represent this situation algebraically and find their present ages.',
 given:['7 years ago: Aftab\'s age &minus; 7 = 7 &times; (daughter\'s age &minus; 7)','3 years from now: Aftab\'s age + 3 = 3 &times; (daughter\'s age + 3)'],
 formula:['Let present age of Aftab = s years, present age of daughter = t years.'],
 work:['~From the first condition:', 's &minus; 7 = 7(t &minus; 7)', 's &minus; 7 = 7t &minus; 49', 's &minus; 7t + 42 = 0 &nbsp; …(i)',
   '~From the second condition:', 's + 3 = 3(t + 3)', 's + 3 = 3t + 9', 's &minus; 3t = 6 &nbsp; …(ii)',
   '~From equation (ii):', 's = 3t + 6 &nbsp; …(iii)',
   '~Substituting (iii) in equation (i):', '(3t + 6) &minus; 7t + 42 = 0', '&minus;4t + 48 = 0', '4t = 48', '&there4; t = 12',
   '~Substituting t = 12 in equation (iii):', 's = 3(12) + 6', 's = 36 + 6', '&there4; s = 42'],
 answer:'&there4; Aftab\'s present age is 42 years and his daughter\'s present age is 12 years.'},

{c:'c2', src:'PYQ', pyq:'2026', marks:'5 Marks · LA', diff:'m',

{c:'c2', src:'PYQ', pyq:'2026', marks:'5 Marks · LA', diff:'h', star:true,

  F('a<sub>1</sub>','a<sub>2</sub>')+' = '+F('b<sub>1</sub>','b<sub>2</sub>')+' &ne; '+F('c<sub>1</sub>','c<sub>2</sub>')+' &rArr; no solution (parallel lines, inconsistent)',
  F('a<sub>1</sub>','a<sub>2</sub>')+' = '+F('b<sub>1</sub>','b<sub>2</sub>')+' = '+F('c<sub>1</sub>','c<sub>2</sub>')+' &rArr; infinitely many solutions (coincident lines, consistent)'],
  note:'Always check all three ratios before concluding — a value that satisfies the first two may fail the third (see the many trap-root examples in Concept 3).'},

{h:'Substitution Method — Steps', lines:[
  '1. Express one variable in terms of the other from either equation.',
  '2. Substitute this expression into the other equation to get one equation in one variable.',
  '3. Solve for that variable.',
  '4. Substitute back to find the second variable.'],
  note:'Best when one equation already isolates a variable easily (coefficient 1).'},

{h:'Elimination Method — Steps', lines:[
  '1. Multiply one or both equations so that a variable has equal (or opposite-sign) coefficients.',
  '2. Add or subtract the equations to eliminate that variable.',
  '3. Solve the resulting single-variable equation.',
  '4. Substitute back to find the eliminated variable.'],
  note:'Best when neither equation isolates a variable cleanly, or coefficients scale to a common multiple easily.'},

{h:'Cross-Multiplication Pattern (add/subtract trick)', lines:[
  'For symmetric pairs like ax + by = c and bx + ay = d:',
  '(i) + (ii): (a+b)(x+y) = c+d &nbsp;&rArr;&nbsp; gives x + y',
  '(ii) &minus; (i): (a&minus;b)(x&minus;y) = d&minus;c &nbsp;&rArr;&nbsp; gives x &minus; y',
  'Then add/subtract these two results to isolate x and y.'],
  note:'Recognise this pattern whenever the two equations have swapped coefficients (e.g. 43x+67y and 67x+43y).'},

{h:'Two-Digit Number Word Problems', lines:[
  'Let tens digit = a, units digit = b.','Number = 10a + b','Number with digits reversed = 10b + a'],
  note:'"Sum of digits", "difference of digits", and "reversed number" clues each become one equation in a and b.'},

{h:'Ages Word Problems', lines:[
  '"x years ago" &rarr; subtract x from present age, then apply the given multiple/relation.',
  '"x years hence / from now" &rarr; add x to present age, then apply the relation.'],
  note:'Always define both ages as variables from their PRESENT values — never from a past or future value directly.'},

{h:'Speed, Distance & Time (Boats/Streams)', lines:[
  'Speed downstream = (speed in still water) + (speed of stream)',
  'Speed upstream = (speed in still water) &minus; (speed of stream)',
  'Time = '+F('Distance','Speed')],
  note:'For these problems, let u = time per km upstream and v = time per km downstream (i.e. u = 1/speed) — this keeps the equations linear instead of having speed in a denominator.'},

{h:'Money & Commercial Word Problems', lines:[
  'Total cost = (fixed charge) + (rate) &times; (quantity/days/distance)',
  'Selling Price = Cost Price &times; (1 &plusmn; '+F('profit% or loss%','100')+')',
  'Simple Interest = '+F('Principal &times; Rate &times; Time','100')],
  note:'"Fixed charge for the first N units, additional charge per unit thereafter" always gives two equations of the form fixed + (days &minus; N) &times; rate = total.'},

{h:'Area of Triangle Formed by Lines with an Axis', lines:[
  'Area = '+F('1','2')+' &times; Base &times; Altitude'],
  note:'When two lines meet an axis, the base is the distance between their two intercepts on that axis, and the altitude is the perpendicular distance of the third vertex (the lines\' intersection point) from that axis.'}
];

const QDATA = [].concat(QDATA_C1, QDATA_C2, QDATA_C3, QDATA_C4);
/* ============ MathsBridge render engine — Ch3 ============ */
const REPORT_META = { board:'CBSE', grade:'10', chapter:'Pair of Linear Equations in Two Variables' };
const REPORT_ENDPOINT = 'PASTE_APPS_SCRIPT_EXEC_URL_HERE'; /* placeholder — GET only, never POST */

/* fraction helper — .fr/.fn/.fd only, never plain text */
function F(n,d){ return '<span class="fr"><span class="fn">'+n+'</span><span class="fd">'+d+'</span></span>'; }
/* grey bracket identity / cancellation note */
function H(t){ return '<span style="color:#888;font-size:13px;font-family:\'Crimson Pro\',serif">['+t+']</span>'; }

const CONCEPTS = [
  {id:'c1', name:'1 · Graphical Method & Consistency'},
  {id:'c2', name:'2 · Algebraic Methods'},
  {id:'c3', name:'3 · Conditions on k'},
  {id:'c4n', name:'4a · Word Problems: Numbers & Digits'},
  {id:'c4f', name:'4b · Word Problems: Fractions'},
  {id:'c4a', name:'4c · Word Problems: Ages'},
  {id:'c4s', name:'4d · Word Problems: Speed-Distance-Time'},
  {id:'c4m', name:'4e · Word Problems: Money & Commercial'},
  {id:'c5', name:'5 · Formulae'}
];
const SECTIONS = [
  {id:'mcq', label:'MCQ'},
  {id:'ar',  label:'A/R'},
  {id:'vsa', label:'VSA · 2M'},
  {id:'sa',  label:'SA · 3M'},
  {id:'la',  label:'LA · 5M'},
  {id:'cb',  label:'Case Based'}
];
const AR_OPTS = [
  'Both Assertion (A) and Reason (R) are true and Reason (R) is the correct explanation of Assertion (A).',
  'Both Assertion (A) and Reason (R) are true, but Reason (R) is not the correct explanation of Assertion (A).',
  'Assertion (A) is true, but Reason (R) is false.',
  'Assertion (A) is false, but Reason (R) is true.'
];
const DIFF = {e:['b-easy','Easy'], m:['b-med','Medium'], h:['b-hard','Hard']};

/* ---- marks is the single source of truth ---- */
/* normalize: m: is always DERIVED from marks, never authored by hand */
function normalize(list){
  list.forEach(function(q){ q.m = classOf(q); });
  return list;
}
function bucketOf(q){
  const mk = q.marks || '';
  if(/A\/R/.test(mk)) return 'ar';
  if(/Case Based/.test(mk)) return 'cb';
  const n = parseInt(mk,10);
  if(n===1) return 'mcq';
  if(n===2) return 'vsa';
  if(n===3) return 'sa';
  if(n===5) return 'la';
  return 'sa';
}
function classOf(q){
  const b = bucketOf(q);
  return {mcq:'q-1m', ar:'q-ar', vsa:'q-2m', sa:'q-3m', la:'q-5m', cb:'q-cb'}[b];
}

function esc(s){ return String(s); }

function workRows(arr){
  let h = '';
  (arr||[]).forEach(function(l){
    if(l.charAt(0)==='~') h += '<div class="say">'+l.slice(1)+'</div>';
    else h += '<div class="k">'+l+'</div>';
  });
  return h;
}

function solBody(q){
  let h = '';
  if(q.steps){                                   /* proof / stepwise style */
    q.steps.forEach(function(s){
      h += '<div class="sol-work"><div class="sol-h">'+s.h+'</div>'+workRows(s.lines)+'</div>';
    });
  } else {
    if(q.given && q.given.length){
      h += '<div class="sol-given"><div class="sol-h">Given</div><div class="g">'
         + q.given.map(function(g){return '• '+g;}).join('<br>') + '</div></div>';
    }
    if(q.formula && q.formula.length){
      h += '<div class="sol-formula"><div class="sol-h">Formula</div><div class="fml">'
         + q.formula.join('<br>') + '</div></div>';
    }
    if(q.tables && q.tables.length) h += tablesHTML(q.tables);
    if(q.work && q.work.length){
      h += '<div class="sol-work"><div class="sol-h">Working</div>'+workRows(q.work)+'</div>';
    }
    if(q.svg) h += q.svg;
  }
  if(q.answer){
    h += '<div class="sol-answer"><div class="sol-h">Answer</div><div class="a">'+q.answer+'</div></div>';
  }
  return h;
}

function tablesHTML(tabs){
  let h = '<div class="gtbl-block">';
  tabs.forEach(function(t){
    h += '<div class="gtbl-title">'+t.title+'</div><table class="gtbl">';
    t.rows.forEach(function(r,i){
      h += '<tr>' + r.map(function(c){ return i===0 ? '<th>'+c+'</th>' : '<td>'+c+'</td>'; }).join('') + '</tr>';
    });
    h += '</table>';
  });
  return h + '</div>';
}

function cardHTML(q, no){
  const bucket = bucketOf(q);
  const cls = classOf(q);
  const ml = q.marks || '';
  const d = DIFF[q.diff] || DIFF.m;
  let h = '<div class="qcard '+cls+'" data-diff="'+d[1]+'" data-no="'+no+'" data-bucket="'+bucket+'">'
        + '<div class="qcard-stripe"></div><div class="qcard-body">';
  h += '<div class="badge-row">'
     + (q.pyq
          ? '<span class="badge b-pyq">'+q.src+' '+q.pyq+'</span>'
          : '<span class="badge b-src">'+q.src+'</span>')
     + '<span class="badge b-marks">'+ml+'</span>'
     + '<span class="badge '+d[0]+'">'+d[1]+'</span>'
     + (q.star ? '<span class="badge b-star">★ Board Frequent</span>' : '')
     + '<span class="qno">Q'+no+'</span>'
     + '</div>';

  if(bucket==='ar'){
    h += '<div class="ar-stem"><div class="ar-a"><b>Assertion (A):</b> '+q.a+'</div>'
       + '<div class="ar-r"><b>Reason (R):</b> '+q.r+'</div></div>';
    h += '<ul class="mcq-opts">';
    AR_OPTS.forEach(function(o,i){
      h += '<li class="mopt" data-i="'+i+'" data-ans="'+q.ans+'"><span class="lab">('+'ABCD'[i]+')</span><span>'+o+'</span></li>';
    });
    h += '</ul>';
  } else if(bucket==='cb'){
    h += '<div class="cbstem">'+q.stem+'</div>';
    if(q.svg) h += q.svg;
    if(q.tables && q.tables.length) h += tablesHTML(q.tables);
    (q.parts||[]).forEach(function(p,i){
      h += '<div class="cbpart"><div class="cbq"><b>('+['i','ii','iii','iv','v'][i]+')</b> '+p.q
         + ' <span class="cbmk">['+p.marks+']</span></div>';
      if(p.opts){
        h += '<ul class="mcq-opts">';
        p.opts.forEach(function(o,j){
          h += '<li class="mopt" data-i="'+j+'" data-ans="'+p.ans+'"><span class="lab">('+'abcd'[j]+')</span><span>'+o+'</span></li>';
        });
        h += '</ul>';
      }
      h += '</div>';
    });
  } else {
    h += '<div class="qt">'+q.q+'</div>';
    if(q.eq) h += '<div class="eqblock">'+q.eq+'</div>';
    if(q.qsvg) h += q.qsvg;
    if(q.opts){
      h += '<ul class="mcq-opts">';
      q.opts.forEach(function(o,i){
        h += '<li class="mopt" data-i="'+i+'" data-ans="'+q.ans+'"><span class="lab">('+'abcd'[i]+')</span><span>'+o+'</span></li>';
      });
      h += '</ul>';
    }
  }

  const needsToggle = (bucket!=='mcq' && bucket!=='ar') || q.given || q.work || q.steps;
  if(needsToggle || bucket==='mcq' || bucket==='ar'){
    h += '<button class="sol-toggle">Show Solution</button>';
  }
  h += '<button class="rep-btn">Report Error</button>';

  let inner = '';
  if(bucket==='cb'){
    (q.parts||[]).forEach(function(p,i){
      inner += '<div class="sol-h" style="color:#0D2B4E;margin-top:6px">Part ('+['i','ii','iii','iv','v'][i]+')</div>'
             + solBody(p);
    });
  } else {
    inner = solBody(q);
  }
  h += '<div class="sol-box">'+inner+'</div>';
  h += '</div></div>';
  return h;
}

/* ---------------- FORMULAE TAB ---------------- */
function formulaeHTML(){
  let h = '';
  FORMULAE.forEach(function(f){
    h += '<div class="formula-card"><div class="formula-header">'+f.h+'<span class="arrow">+</span></div>'
       + '<div class="formula-body"><div class="fml">'+f.lines.join('<br>')+'</div>'
       + (f.note ? '<div class="note">'+f.note+'</div>' : '')
       + '</div></div>';
  });
  return h;
}

/* ---------------- RENDER ---------------- */
function render(){
  const ctabs = document.getElementById('ctabs');
  const holder = document.getElementById('concepts');
  ctabs.innerHTML = '';
  holder.innerHTML = '';

  CONCEPTS.forEach(function(c, ci){
    const b = document.createElement('button');
    b.className = 'ctab' + (ci===0 ? ' active' : '');
    b.textContent = c.name;
    b.setAttribute('data-c', c.id);
    ctabs.appendChild(b);

    const panel = document.createElement('div');
    panel.className = 'cpanel' + (ci===0 ? ' active' : '');
    panel.id = c.id;

    if(c.id === 'c5'){
      panel.innerHTML = formulaeHTML();
      holder.appendChild(panel);
      return;
    }

    let counters = {};
    let secTabs = '<div class="sec-tabs">';
    let panels = '';
    SECTIONS.forEach(function(s, si){
      const list = QDATA.filter(function(q){ return q.c===c.id && bucketOf(q)===s.id; });
      counters[s.id] = list.length;
      secTabs += '<button class="sec-tab'+(si===0?' active':'')+'" data-c="'+c.id+'" data-s="'+s.id+'">'
               + s.label + ' (' + list.length + ')</button>';
      let body = '';
      body += '<div class="filter-bar"><span class="fl">Difficulty</span>'
            + ['all','Easy','Medium','Hard'].map(function(f,fi){
                return '<button class="filter-btn'+(fi===0?' active':'')+'" data-t="'+c.id+'-'+s.id+'" data-f="'+f+'">'
                     + (f==='all'?'All':f) + '</button>';
              }).join('') + '</div>';
      if(!list.length) body += '<div class="empty">No questions in this section.</div>';
      list.forEach(function(q, i){ body += cardHTML(q, i+1); });
      panels += '<div class="sec-panel'+(si===0?' active':'')+'" id="'+c.id+'-'+s.id+'">'+body+'</div>';
    });
    secTabs += '</div>';
    panel.innerHTML = secTabs + panels;
    holder.appendChild(panel);
  });

  wire();
}

/* ---------------- EVENTS ---------------- */
function wire(){
  document.querySelectorAll('.ctab').forEach(function(b){
    b.onclick = function(){
      document.querySelectorAll('.ctab').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');
      document.querySelectorAll('.cpanel').forEach(function(p){p.classList.remove('active');});
      document.getElementById(b.getAttribute('data-c')).classList.add('active');
    };
  });
  document.querySelectorAll('.sec-tab').forEach(function(b){
    b.onclick = function(){
      const c = b.getAttribute('data-c'), s = b.getAttribute('data-s');
      document.querySelectorAll('.sec-tab[data-c="'+c+'"]').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');
      document.querySelectorAll('#'+c+' .sec-panel').forEach(function(p){p.classList.remove('active');});
      document.getElementById(c+'-'+s).classList.add('active');
    };
  });
  document.querySelectorAll('.filter-btn').forEach(function(b){
    b.onclick = function(){
      const t = b.getAttribute('data-t'), f = b.getAttribute('data-f');
      document.querySelectorAll('.filter-btn[data-t="'+t+'"]').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');
      document.querySelectorAll('#'+t+' .qcard').forEach(function(card){
        card.style.display = (f==='all' || card.getAttribute('data-diff')===f) ? 'flex' : 'none';
      });
    };
  });
  document.querySelectorAll('.sol-toggle').forEach(function(b){
    b.onclick = function(){
      const box = b.parentNode.querySelector('.sol-box');
      box.classList.toggle('open');
      b.textContent = box.classList.contains('open') ? 'Hide Solution' : 'Show Solution';
    };
  });
  document.querySelectorAll('.mcq-opts').forEach(function(ul){
    ul.querySelectorAll('.mopt').forEach(function(li){
      li.onclick = function(){
        if(li.classList.contains('locked')) return;
        const ans = parseInt(li.getAttribute('data-ans'),10);
        const i = parseInt(li.getAttribute('data-i'),10);
        ul.querySelectorAll('.mopt').forEach(function(x){
          x.classList.add('locked');
          if(parseInt(x.getAttribute('data-i'),10)===ans) x.classList.add('correct');
        });
        if(i!==ans) li.classList.add('wrong');
      };
    });
  });
  document.querySelectorAll('.rep-btn').forEach(function(b){
    b.onclick = function(){
      const card = b.closest('.qcard');
      const panel = card.closest('.sec-panel');
      const cp = card.closest('.cpanel');
      openReport({
        tab: (cp ? cp.id : '') + ' / ' + (panel ? panel.id.split('-')[1].toUpperCase() : ''),
        qno: card.getAttribute('data-no')
      });
    };
  });
  document.querySelectorAll('.formula-header').forEach(function(hd){
    hd.onclick = function(){
      const body = hd.nextElementSibling;
      body.classList.toggle('open');
      hd.querySelector('.arrow').textContent = body.classList.contains('open') ? '–' : '+';
    };
  });
  document.getElementById('repCancel').onclick = function(){
    document.getElementById('repMask').classList.remove('open');
  };
  document.getElementById('repSend').onclick = sendReport;
}

let REP_CTX = {};
function openReport(ctx){
  REP_CTX = ctx;
  document.getElementById('repMeta').textContent =
    REPORT_META.board + ' · Class ' + REPORT_META.grade + ' · ' + REPORT_META.chapter
    + ' · ' + ctx.tab + ' · Q' + ctx.qno;
  document.getElementById('repText').value = '';
  document.getElementById('repMsg').textContent = '';
  document.getElementById('repMask').classList.add('open');
}
function sendReport(){
  const txt = document.getElementById('repText').value.trim();
  if(!txt){ document.getElementById('repMsg').textContent = 'Please describe the error.'; return; }
  const p = new URLSearchParams({
    board: REPORT_META.board, grade: REPORT_META.grade, chapter: REPORT_META.chapter,
    tab: REP_CTX.tab, qno: REP_CTX.qno, message: txt, date: new Date().toISOString()
  });
  /* GET only — a POST is silently dropped by the Apps Script redirect */
  fetch(REPORT_ENDPOINT + '?' + p.toString(), {method:'GET', mode:'no-cors'})
    .then(function(){ document.getElementById('repMsg').textContent = 'Sent. Thank you!'; })
    .catch(function(){ document.getElementById('repMsg').textContent = 'Could not send. Please try again.'; });
  setTimeout(function(){ document.getElementById('repMask').classList.remove('open'); }, 900);
}

if(typeof QDATA !== 'undefined') normalize(QDATA);
if(typeof window !== 'undefined'){ window.QDATA = QDATA; window.bucketOf = bucketOf; window.classOf = classOf; }
if(typeof document !== 'undefined' && document.getElementById('concepts')) render();
if(typeof module !== 'undefined') module.exports = {render:render, bucketOf:bucketOf, classOf:classOf};

</script>
