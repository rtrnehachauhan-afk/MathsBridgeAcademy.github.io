<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS Aggarwal — Compound Interest Class 9</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0eeff;color:#1a1a2e;min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:20px 16px 60px}

.hero{background:#1a1a3e;border-radius:14px;padding:22px 28px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hero-left .unit{font-size:11px;font-weight:600;color:#AFA9EC;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.hero-left .title{font-size:24px;font-weight:700;color:#fff}
.hero-left .sub{font-size:12px;color:#CECBF6;margin-top:3px}
.hero-stats{display:flex;gap:8px;flex-wrap:wrap}
.hstat{background:rgba(255,255,255,.1);border-radius:10px;padding:9px 16px;text-align:center}
.hstat .n{font-size:20px;font-weight:700;color:#fff}
.hstat .l{font-size:10px;color:#AFA9EC;margin-top:2px}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab-btn{flex:1;min-width:120px;padding:10px 8px;font-size:13px;font-weight:700;border:none;cursor:pointer;border-radius:10px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.tab-btn.t-2a{background:#E1F5EE;color:#0F6E56}
.tab-btn.t-2a.active{background:#085041;color:#fff}
.tab-btn.t-2b{background:#EEEDFE;color:#534AB7}
.tab-btn.t-2b.active{background:#3C3489;color:#fff}
.tab-btn.t-mcq{background:#FAEEDA;color:#854F0B}
.tab-btn.t-mcq.active{background:#633806;color:#fff}
.tab-btn.t-2c{background:#FCEBEB;color:#791F1F}
.tab-btn.t-2c.active{background:#A32D2D;color:#fff}

/* FILTERS */
.filter-row{display:flex;align-items:center;gap:6px;padding:8px 0 12px;flex-wrap:wrap}
.filter-row span{font-size:12px;color:#666;font-weight:600}
.fb{padding:5px 13px;font-size:12px;font-weight:700;border-radius:20px;border:2px solid #ddd;cursor:pointer;transition:all .15s;background:#fff;color:#999}
.fb.fa.on{border-color:#7F77DD;background:#EEEDFE;color:#3C3489}
.fb.fe.on{border-color:#1D9E75;background:#E1F5EE;color:#085041}
.fb.fm.on{border-color:#BA7517;background:#FAEEDA;color:#633806}
.fb.fh.on{border-color:#E24B4A;background:#FCEBEB;color:#791F1F}

/* JUMP */
.jump-row{display:flex;gap:4px;flex-wrap:wrap;padding-bottom:10px;border-bottom:2px solid #e0ddf7;margin-bottom:12px}
.jb{width:28px;height:28px;font-size:11px;font-weight:700;border-radius:7px;border:none;cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:center}
.jb.je{background:#9FE1CB;color:#04342C}
.jb.jm{background:#FAC775;color:#412402}
.jb.jh{background:#F09595;color:#501313}
.jb:hover{opacity:.6}

/* QUESTION CARD */
.qcard{border-radius:12px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.09)}
.qcard .stripe{height:5px}
.qcard.easy .stripe{background:linear-gradient(90deg,#1D9E75,#5DCAA5)}
.qcard.medium .stripe{background:linear-gradient(90deg,#BA7517,#EF9F27)}
.qcard.hard .stripe{background:linear-gradient(90deg,#C0392B,#E74C3C)}

.q-head{background:#1a1a3e;padding:12px 18px;display:flex;align-items:flex-start;gap:12px}
.qnum-b{width:30px;height:30px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.easy .qnum-b{background:#9FE1CB;color:#04342C}
.medium .qnum-b{background:#FAC775;color:#412402}
.hard .qnum-b{background:#F09595;color:#501313}
.qtxt{font-size:14px;font-weight:600;color:#fff;line-height:1.6;flex:1}
.qbadge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:3px}
.easy .qbadge{background:#9FE1CB;color:#04342C}
.medium .qbadge{background:#FAC775;color:#412402}
.hard .qbadge{background:#F09595;color:#501313}

.qfooter{background:#252550;padding:7px 18px;display:flex;align-items:center;gap:8px}
.src-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.pill-2a{background:#E1F5EE;color:#085041}
.pill-2b{background:#EEEDFE;color:#3C3489}
.pill-mcq{background:#FAEEDA;color:#633806}
.pill-2c{background:#FCEBEB;color:#791F1F}
.sol-btn{margin-left:auto;font-size:12px;font-weight:700;padding:5px 14px;border-radius:8px;border:2px solid #7F77DD;background:transparent;cursor:pointer;color:#AFA9EC;transition:all .15s}
.sol-btn:hover{background:#3C3489;color:#fff;border-color:#3C3489}

/* SOLUTION */
.sol-body{display:none;background:#fff}
.sol-body.open{display:block}

.given-block{background:#e8e6ff;padding:10px 18px;border-bottom:1px solid #d0ccf0}
.given-label{font-size:11px;font-weight:800;color:#3C3489;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.given-line{font-size:13px;color:#1a1a3e;line-height:1.8}

.year-block{padding:12px 18px 14px;border-bottom:1px solid #f0eef8}
.year-block:last-child{border-bottom:none}
.year-label{display:inline-block;background:#1a1a3e;color:#fff;font-size:11px;font-weight:800;padding:3px 12px;border-radius:5px;margin-bottom:10px;letter-spacing:.04em}

.sol-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.sol-var{font-size:14px;font-weight:700;color:#1a1a3e;min-width:14px}
.sol-eq{font-size:13px;color:#555;margin:0 2px}
.sol-eq2{font-size:14px;color:#555;margin:0 4px}
.sol-val{font-size:15px;font-weight:800;color:#c8860a}
.sol-plain{font-size:13px;color:#333;line-height:1.7}

.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 4px}
.frac .num{font-size:12px;color:#1a1a3e;border-bottom:1.5px solid #555;padding:0 4px 1px;text-align:center}
.frac .den{font-size:12px;color:#1a1a3e;padding:1px 4px 0;text-align:center}

.bal-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.bal-lbl{font-size:13px;font-weight:600;color:#1a1a3e;min-width:60px}

.final-ans{background:#1a1a3e;padding:11px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.final-ans span{font-size:14px;font-weight:700;color:#fff}
.fa-val{color:#f0b429;font-size:15px}

/* MCQ SPECIFIC */
.mcq-options{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:12px 18px;background:#fff;border-bottom:1px solid #f0eef8}
.mcq-opt{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid #e0ddf7;background:#fafafa;color:#333;transition:all .15s;text-align:left}
.mcq-opt:hover{border-color:#7F77DD;background:#EEEDFE;color:#3C3489}
.mcq-opt.correct{border-color:#1D9E75;background:#E1F5EE;color:#085041}
.mcq-opt.wrong{border-color:#E24B4A;background:#FCEBEB;color:#791F1F}
.mcq-result{display:none;padding:8px 18px 12px;background:#fff}
.mcq-result.show{display:block}
.mcq-result .res-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.mcq-result.correct-res .res-label{color:#085041}
.mcq-result.wrong-res .res-label{color:#791F1F}
.mcq-result .res-txt{font-size:13px;color:#333;line-height:1.7}
.mcq-show-sol{margin-left:auto;font-size:12px;font-weight:700;padding:5px 12px;border-radius:8px;border:2px solid #FAEEDA;background:transparent;cursor:pointer;color:#c8860a;transition:all .15s}
.mcq-show-sol:hover{background:#FAEEDA;color:#633806}

.count-chip{font-size:11px;background:#e8e6ff;color:#534AB7;padding:3px 10px;border-radius:20px;margin-left:auto;font-weight:600}
.empty-msg{text-align:center;padding:2rem;color:#999;font-size:13px}
.done-zone{text-align:center;padding:22px 0 8px}
.done-title{font-size:17px;font-weight:700;color:#3C3489;margin-bottom:5px}
.done-sub{font-size:13px;color:#666}
.nav-row{display:flex;gap:8px;justify-content:center;margin-top:12px}
.nav-2b{padding:10px 22px;font-size:13px;font-weight:700;border-radius:10px;border:none;cursor:pointer;background:#3C3489;color:#fff}
.nav-mcq{padding:10px 22px;font-size:13px;font-weight:700;border-radius:10px;border:none;cursor:pointer;background:#633806;color:#fff}
.nav-2c{padding:10px 22px;font-size:13px;font-weight:700;border-radius:10px;border:none;cursor:pointer;background:#A32D2D;color:#fff}
</style>
</head>
<body>
<div class="wrap">

<div class="hero">
  <div class="hero-left">
    <div class="unit">Chapter 2 · Compound Interest · ICSE Class 9</div>
    <div class="title">RS Aggarwal — Foundation Maths</div>
    <div class="sub">Goyal Brothers Prakashan &nbsp;·&nbsp; Exercise 2A &nbsp;·&nbsp; Exercise 2B &nbsp;·&nbsp; Exercise 2C &nbsp;·&nbsp; MCQs</div>
  </div>
  <div class="hero-stats">
    <div class="hstat"><div class="n">14</div><div class="l">Ex. 2A</div></div>
    <div class="hstat"><div class="n">20</div><div class="l">Ex. 2B</div></div>
    <div class="hstat"><div class="n">15</div><div class="l">Ex. 2C</div></div>
    <div class="hstat"><div class="n">20</div><div class="l">MCQs</div></div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn t-2a active" id="btn-2a" onclick="switchTab('2a')">&#128218; Exercise 2A</button>
  <button class="tab-btn t-2b" id="btn-2b" onclick="switchTab('2b')">&#128221; Exercise 2B</button>
  <button class="tab-btn t-2c" id="btn-2c" onclick="switchTab('2c')">&#127807; Exercise 2C</button>
  <button class="tab-btn t-mcq" id="btn-mcq" onclick="switchTab('mcq')">&#127381; MCQs</button>
</div>

<div id="panel-2a"></div>
<div id="panel-2b" style="display:none"></div>
<div id="panel-2c" style="display:none"></div>
<div id="panel-mcq" style="display:none"></div>

</div>
<script>
function frac(n,d){return `<span class="frac"><span class="num">${n}</span><span class="den">${d}</span></span>`}

const D={
'2a':[
{d:'easy',q:'Calculate the amount and the compound interest on ₹25,000 for 2 years at 8% p.a., compounded annually.',
 given:['P = ₹25,000 &nbsp;&nbsp; R = 8% p.a. &nbsp;&nbsp; n = 2 years'],
 years:[
  {label:'Working',rows:[
    {t:'note',text:`A = 25,000 × ${frac('108','100')} × ${frac('108','100')}`},
    {t:'note',text:`= 25,000 × ${frac('27','25')} × ${frac('27','25')}`},
    {t:'note',text:'= 40 × 27 × 27 = <span class="sol-val">₹29,160</span>'},
  ]},
 ],
 final:'A = <span class="fa-val">₹29,160</span> &nbsp;|&nbsp; C.I. = 29,160 − 25,000 = <span class="fa-val">₹4,160</span>'},

{d:'medium',q:'Rohit borrows ₹62,500 from Arun at 10% p.a. SI for 2 years. He lends the same to Kunal at 10% p.a. CI for 2 years. Find Rohit\'s profit.',
 given:['P = ₹62,500 &nbsp;&nbsp; R = 10% &nbsp;&nbsp; T = 2 years'],
 years:[
  {label:'SI paid by Rohit to Arun',rows:[
    {t:'note',text:`S.I. = ${frac('62,500 × 10 × 2','100')} = <span class="sol-val">₹12,500</span>`},
  ]},
  {label:'CI received by Rohit from Kunal',rows:[
    {t:'note',text:`A = 62,500 × ${frac('110','100')} × ${frac('110','100')}`},
    {t:'note',text:`= 62,500 × ${frac('11','10')} × ${frac('11','10')} = 625 × 121 = <span class="sol-val">₹75,625</span>`},
    {t:'note',text:'C.I. = 75,625 − 62,500 = <span class="sol-val">₹13,125</span>'},
  ]},
 ],
 final:'Profit = 13,125 − 12,500 = <span class="fa-val">₹625</span>'},

{d:'medium',q:'A man invests ₹10,000 for 3 years. At end of 1 year it amounts to ₹11,200. Find: (i) rate % p.a. (ii) interest accrued in 2nd year (iii) amount at end of 3rd year.',
 given:['P = ₹10,000 &nbsp;&nbsp; A after Y1 = ₹11,200'],
 years:[
  {label:'(i) Finding Rate',rows:[
    {t:'note',text:`S.I. for Y1 = A − P = 11,200 − 10,000 = ₹1,200`},
    {t:'note',text:`S.I. = ${frac('P × R × T','100')} &nbsp;→&nbsp; 1,200 = ${frac('10,000 × R × 1','100')}`},
    {t:'note',text:`R = ${frac('1,200 × 100','10,000')} = <span class="sol-val">12%</span>`},
  ]},
  {label:'(ii) Interest accrued in 2nd year (P = ₹11,200)',rows:[
    {t:'I',expr:`${frac('11,200 × 12 × 1','100')}`,val:'₹1,344'},
    {t:'A',expr:'11,200 + 1,344',val:'₹12,544'},
  ]},
  {label:'(iii) Amount at end of 3rd year (P = ₹12,544)',rows:[
    {t:'I',expr:`${frac('12,544 × 12 × 1','100')}`,val:'₹1,505.28'},
    {t:'A',expr:'12,544 + 1,505.28',val:'₹14,049.28'},
  ]},
 ],
 final:'R = <span class="fa-val">12%</span> &nbsp;|&nbsp; Y2 interest = <span class="fa-val">₹1,344</span> &nbsp;|&nbsp; A₃ = <span class="fa-val">₹14,049.28</span>'},

{d:'hard',q:'Sudhakar borrows ₹22,500 at 10% p.a. compounded annually. Repays ₹11,250 at end of Y1 and ₹12,550 at end of Y2. Find loan outstanding at end of Y3.',
 given:['P = ₹22,500 &nbsp;&nbsp; R = 10% p.a.','Repays ₹11,250 (end Y1) &nbsp;|&nbsp; ₹12,550 (end Y2)'],
 years:[
  {label:'1st Year',rows:[
    {t:'I',expr:`${frac('22,500 × 10 × 1','100')}`,val:'₹2,250'},
    {t:'A',expr:'22,500 + 2,250',val:'₹24,750'},
    {t:'bal',expr:'24,750 − 11,250',val:'₹13,500'},
  ]},
  {label:'2nd Year',rows:[
    {t:'I',expr:`${frac('13,500 × 10 × 1','100')}`,val:'₹1,350'},
    {t:'A',expr:'13,500 + 1,350',val:'₹14,850'},
    {t:'bal',expr:'14,850 − 12,550',val:'₹2,300'},
  ]},
  {label:'3rd Year',rows:[
    {t:'I',expr:`${frac('2,300 × 10 × 1','100')}`,val:'₹230'},
    {t:'A',expr:'2,300 + 230',val:'₹2,530'},
  ]},
 ],
 final:'Loan outstanding at end of 3rd year = <span class="fa-val">₹2,530</span>'},

{d:'hard',q:'A man borrows ₹15,000 at 12% p.a. compounded annually. He repays ₹4,400 at end of each year. Find amount outstanding at beginning of 3rd year.',
 given:['P = ₹15,000 &nbsp;&nbsp; R = 12% &nbsp;&nbsp; Repays ₹4,400 at end of each year'],
 years:[
  {label:'1st Year',rows:[
    {t:'I',expr:`${frac('15,000 × 12 × 1','100')}`,val:'₹1,800'},
    {t:'A',expr:'15,000 + 1,800',val:'₹16,800'},
    {t:'bal',expr:'16,800 − 4,400',val:'₹12,400'},
  ]},
  {label:'2nd Year',rows:[
    {t:'I',expr:`${frac('12,400 × 12 × 1','100')}`,val:'₹1,488'},
    {t:'A',expr:'12,400 + 1,488',val:'₹13,888'},
    {t:'bal',expr:'13,888 − 4,400',val:'₹9,488'},
  ]},
 ],
 final:'Outstanding at beginning of 3rd year = <span class="fa-val">₹9,488</span>'},

{d:'hard',q:'Mr. Ravi borrows ₹16,000 for 2 years at 10% (Y1) and 12% (Y2). Repays ₹5,600 at end of Y1. Find amount outstanding at end of Y2.',
 given:['P = ₹16,000 &nbsp;&nbsp; R₁ = 10%, R₂ = 12% &nbsp;&nbsp; Repays ₹5,600 at end of Y1'],
 years:[
  {label:'1st Year',rows:[
    {t:'I',expr:`${frac('16,000 × 10 × 1','100')}`,val:'₹1,600'},
    {t:'A',expr:'16,000 + 1,600',val:'₹17,600'},
    {t:'bal',expr:'17,600 − 5,600',val:'₹12,000'},
  ]},
  {label:'2nd Year',rows:[
    {t:'I',expr:`${frac('12,000 × 12 × 1','100')}`,val:'₹1,440'},
    {t:'A',expr:'12,000 + 1,440',val:'₹13,440'},
  ]},
 ],
 final:'Amount outstanding at end of Y2 = <span class="fa-val">₹13,440</span>'},

{d:'medium',q:'Calculate the amount of ₹30,000 at the end of 2 years 4 months, compounded annually at 10% p.a.',
 given:['P = ₹30,000 &nbsp;&nbsp; R = 10% &nbsp;&nbsp; T = 2 years 4 months','For 2 full years → use CI. For remaining 4 months → use SI on new amount.'],
 years:[
  {label:'1st Year',rows:[
    {t:'I',expr:`${frac('30,000 × 10 × 1','100')}`,val:'₹3,000'},
    {t:'A',expr:'30,000 + 3,000',val:'₹33,000'},
  ]},
  {label:'2nd Year',rows:[
    {t:'I',expr:`${frac('33,000 × 10 × 1','100')}`,val:'₹3,300'},
    {t:'A',expr:'33,000 + 3,300',val:'₹36,300'},
  ]},
  {label:'4 Months — S.I. on ₹36,300',rows:[
    {t:'I',expr:`${frac('36,300 × 10 × 4','100 × 12')}`,val:'₹1,210'},
    {t:'A',expr:'36,300 + 1,210',val:'₹37,510'},
  ]},
 ],
 final:'A = <span class="fa-val">₹37,510</span>'},

{d:'medium',q:'Calculate the amount of ₹31,250 at end of 2½ years, compounded annually at 8% p.a.',
 given:['P = ₹31,250 &nbsp;&nbsp; R = 8% &nbsp;&nbsp; T = 2½ years','For 2 full years → use CI. For remaining ½ year → use SI on new amount.'],
 years:[
  {label:'1st Year',rows:[
    {t:'I',expr:`${frac('31,250 × 8 × 1','100')}`,val:'₹2,500'},
    {t:'A',expr:'31,250 + 2,500',val:'₹33,750'},
  ]},
  {label:'2nd Year',rows:[
    {t:'I',expr:`${frac('33,750 × 8 × 1','100')}`,val:'₹2,700'},
    {t:'A',expr:'33,750 + 2,700',val:'₹36,450'},
  ]},
  {label:'½ Year — S.I. on ₹36,450',rows:[
    {t:'I',expr:`${frac('36,450 × 8 × 1','100 × 2')}`,val:'₹1,458'},
    {t:'A',expr:'36,450 + 1,458',val:'₹37,908'},
  ]},
 ],
 final:'A = <span class="fa-val">₹37,908</span>'},

{d:'easy',q:'Calculate Amount and CI on ₹15,000 for 2 years at 8% and 9% for successive years.',
 given:['P = ₹15,000 &nbsp;&nbsp; r₁ = 8%, r₂ = 9%'],
 years:[
  {label:'Working',rows:[
    {t:'note',text:`A = 15,000 × ${frac('108','100')} × ${frac('109','100')}`},
    {t:'note',text:`= 15,000 × ${frac('27','25')} × ${frac('109','100')}`},
    {t:'note',text:`= ${frac('15,000 × 27 × 109','25 × 100')} = ${frac('6 × 27 × 109','1')} = <span class="sol-val">₹17,658</span>`},
  ]},
 ],
 final:'A = <span class="fa-val">₹17,658</span> &nbsp;|&nbsp; C.I. = 17,658 − 15,000 = <span class="fa-val">₹2,658</span>'},

{d:'easy',q:'Calculate Amount and CI on ₹25,000 for 3 years at 8%, 9% and 10% for successive years.',
 given:['P = ₹25,000 &nbsp;&nbsp; r₁ = 8%, r₂ = 9%, r₃ = 10%'],
 years:[
  {label:'Working',rows:[
    {t:'note',text:`A = 25,000 × ${frac('108','100')} × ${frac('109','100')} × ${frac('110','100')}`},
    {t:'note',text:`= 25,000 × ${frac('27','25')} × ${frac('109','100')} × ${frac('11','10')}`},
    {t:'note',text:`= ${frac('25,000 × 27 × 109 × 11','25 × 100 × 10')} = ${frac('1,000 × 27 × 109 × 11','25 × 100')} = <span class="sol-val">₹32,373</span>`},
  ]},
 ],
 final:'A = <span class="fa-val">₹32,373</span> &nbsp;|&nbsp; C.I. = 32,373 − 25,000 = <span class="fa-val">₹7,373</span>'},

{d:'hard',q:'Peter invested ₹2,40,000 for 2 years at 10% p.a. If 20% of interest at end of each year is deducted as income tax, find amount received at end of 2 years.',
 given:['P = ₹2,40,000 &nbsp;&nbsp; R = 10% &nbsp;&nbsp; Tax = 20% of interest each year'],
 years:[
  {label:'1st Year',rows:[
    {t:'I',expr:`${frac('2,40,000 × 10 × 1','100')}`,val:'₹24,000'},
    {t:'note',text:`Tax deducted = ${frac('24,000 × 20','100')} = ₹4,800`},
    {t:'note',text:'Net interest credited = 24,000 − 4,800 = ₹19,200'},
    {t:'A',expr:'2,40,000 + 19,200',val:'₹2,59,200'},
  ]},
  {label:'2nd Year',rows:[
    {t:'I',expr:`${frac('2,59,200 × 10 × 1','100')}`,val:'₹25,920'},
    {t:'note',text:`Tax deducted = ${frac('25,920 × 20','100')} = ₹5,184`},
    {t:'note',text:'Net interest credited = 25,920 − 5,184 = ₹20,736'},
    {t:'A',expr:'2,59,200 + 20,736',val:'₹2,79,936'},
  ]},
 ],
 final:'Amount received at end of 2 years = <span class="fa-val">₹2,79,936</span>'},

let curTab='2a';
const filters={'2a':'all','2b':'all','2c':'all',mcq:'all'};

function pillClass(t){return t==='2a'?'pill-2a':t==='2b'?'pill-2b':t==='2c'?'pill-2c':'pill-mcq'}
function pillLabel(t){return t==='2a'?'Ex. 2A':t==='2b'?'Ex. 2B':t==='2c'?'Ex. 2C':'MCQ'}

function buildSolHTML(q){
  let h='';
  h+=`<div class="given-block"><div class="given-label">Given</div>`;
  q.given.forEach(g=>{ h+=`<div class="given-line">${g}</div>`; });
  h+=`</div>`;
  q.years.forEach(yr=>{
    h+=`<div class="year-block"><span class="year-label">${yr.label}</span>`;
    yr.rows.forEach(row=>{
      if(row.t==='I') h+=`<div class="sol-row"><span class="sol-var">I</span><span class="sol-eq">=</span>${row.expr}<span class="sol-eq2">=</span><span class="sol-val">${row.val}</span></div>`;
      else if(row.t==='A') h+=`<div class="sol-row"><span class="sol-var">A</span><span class="sol-eq">=</span><span class="sol-plain">${row.expr}</span><span class="sol-eq2">=</span><span class="sol-val">${row.val}</span></div>`;
      else if(row.t==='bal') h+=`<div class="bal-row"><span class="bal-lbl">Balance</span><span class="sol-eq">=</span><span class="sol-plain">${row.expr}</span><span class="sol-eq2">=</span><span class="sol-val">${row.val}</span></div>`;
      else if(row.t==='Av') h+=`<div class="sol-row"><span class="sol-var">&#8756;</span><span class="sol-val" style="font-size:15px">${row.val}</span></div>`;
      else if(row.t==='note') h+=`<div class="sol-row"><span class="sol-plain">${row.text}</span></div>`;
    });
    h+=`</div>`;
  });
  h+=`<div class="final-ans"><span>${q.final}</span></div>`;
  return h;
}

function buildMCQCard(q, i, tab){
  const sid=`sol_${tab}_${i}`;
  const optLetters=['(a)','(b)','(c)','(d)'];
  let h=`<div class="qcard ${q.d}" id="qc_${tab}_${i+1}">
    <div class="stripe"></div>
    <div class="q-head">
      <div class="qnum-b">Q${i+1}</div>
      <div class="qtxt">${q.q}</div>
      <span class="qbadge">${q.d.charAt(0).toUpperCase()+q.d.slice(1)}</span>
    </div>
    <div class="mcq-options">`;
  q.opts.forEach((opt,oi)=>{
    h+=`<button class="mcq-opt" id="opt_${tab}_${i}_${oi}" onclick="checkMCQ('${tab}',${i},${oi})">${optLetters[oi]} ${opt}</button>`;
  });
  h+=`</div>
    <div class="mcq-result" id="res_${tab}_${i}"></div>
    <div class="qfooter">
      <span class="src-pill ${pillClass(tab)}">${pillLabel(tab)} Q${i+1}</span>
      <button class="mcq-show-sol" onclick="togSol('${sid}',this)">Show Solution</button>
    </div>
    <div class="sol-body" id="${sid}">${buildSolHTML(q)}</div>
  </div>`;
  return h;
}

function checkMCQ(tab, qi, oi){
  const q=D[tab][qi];
  const opts=document.querySelectorAll(`[id^="opt_${tab}_${qi}_"]`);
  const resEl=document.getElementById(`res_${tab}_${qi}`);
  opts.forEach((o,idx)=>{
    o.classList.remove('correct','wrong');
    if(idx===q.ans) o.classList.add('correct');
    else if(idx===oi && oi!==q.ans) o.classList.add('wrong');
    o.disabled=true;
  });
  const correct=oi===q.ans;
  resEl.className=`mcq-result show ${correct?'correct-res':'wrong-res'}`;
  resEl.innerHTML=correct
    ?`<div class="res-label">&#10003; Correct!</div>`
    :`<div class="res-label">&#10007; Incorrect — Correct answer is (${['a','b','c','d'][q.ans]})</div>`;
}

function buildPanel(tab){
  const f=filters[tab];
  const all=D[tab];
  const items=f==='all'?all:all.filter(q=>q.d===f);
  const panel=document.getElementById('panel-'+tab);

  const ec=all.filter(q=>q.d==='easy').length;
  const mc=all.filter(q=>q.d==='medium').length;
  const hc=all.filter(q=>q.d==='hard').length;

  let h=`<div class="filter-row">
    <span>Difficulty:</span>
    <button class="fb fa ${f==='all'?'on':''}" onclick="setF('${tab}','all',this)">All (${all.length})</button>
    <button class="fb fe ${f==='easy'?'on':''}" onclick="setF('${tab}','easy',this)">Easy (${ec})</button>
    <button class="fb fm ${f==='medium'?'on':''}" onclick="setF('${tab}','medium',this)">Medium (${mc})</button>
    <button class="fb fh ${f==='hard'?'on':''}" onclick="setF('${tab}','hard',this)">Hard (${hc})</button>
    <span class="count-chip">${items.length} showing</span>
  </div>
  <div class="jump-row">`;
  items.forEach((_,i)=>{
    const jc=_.d==='easy'?'je':_.d==='medium'?'jm':'jh';
    h+=`<button class="jb ${jc}" onclick="scrollQ('${tab}',${i+1})">${i+1}</button>`;
  });
  h+=`</div>`;

  if(!items.length){h+=`<div class="empty-msg">No questions for this filter.</div>`;panel.innerHTML=h;return;}

  if(tab==='mcq'){
    items.forEach((q,i)=>{ h+=buildMCQCard(q,D[tab].indexOf(q),tab); });
  } else {
    items.forEach((q,i)=>{
      const qi=D[tab].indexOf(q);
      const sid=`sol_${tab}_${qi}`;
      h+=`<div class="qcard ${q.d}" id="qc_${tab}_${i+1}">
        <div class="stripe"></div>
        <div class="q-head">
          <div class="qnum-b">Q${i+1}</div>
          <div class="qtxt">${q.q}</div>
          <span class="qbadge">${q.d.charAt(0).toUpperCase()+q.d.slice(1)}</span>
        </div>
        <div class="qfooter">
          <span class="src-pill ${pillClass(tab)}">${pillLabel(tab)} Q${i+1}</span>
          <button class="sol-btn" onclick="togSol('${sid}',this)">Show Solution</button>
        </div>
        <div class="sol-body" id="${sid}">${buildSolHTML(q)}</div>
      </div>`;
    });
  }

  const nxt={'2a':'2b','2b':'2c','2c':'mcq',mcq:null};
  const lbl={'2a':'Exercise 2B &rarr;','2b':'Exercise 2C &rarr;','2c':'MCQs &rarr;'};
  const nc={'2a':'nav-2b','2b':'nav-2c','2c':'nav-mcq'};
  const dt={'2a':'Exercise 2A complete!','2b':'Exercise 2B complete!','2c':'Exercise 2C complete!',mcq:'All done!'};
  const msg={'2a':'Move on to Exercise 2B','2b':'Move on to Exercise 2C','2c':'Try the MCQs next','mcq':'You have covered the full RS Aggarwal Chapter 2'};

  h+=`<div class="done-zone"><div class="done-title">&#10003; ${dt[tab]}</div><div class="done-sub">${msg[tab]}</div>`;
  if(nxt[tab]) h+=`<div class="nav-row"><button class="${nc[tab]}" onclick="switchTab('${nxt[tab]}')">${lbl[tab]}</button></div>`;
  h+=`</div>`;
  panel.innerHTML=h;
}

function togSol(id,btn){
  const el=document.getElementById(id);
  const open=el.classList.toggle('open');
  btn.textContent=open?'Hide Solution':'Show Solution';
}
function scrollQ(tab,n){
  const el=document.getElementById(`qc_${tab}_${n}`);
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
}
function setF(tab,f){filters[tab]=f;buildPanel(tab);}

function switchTab(t){
  curTab=t;
  ['2a','2b','2c','mcq'].forEach(s=>{
    document.getElementById('panel-'+s).style.display=s===t?'block':'none';
    const b=document.getElementById('btn-'+s);
    b.className=`tab-btn t-${s}${s===t?' active':''}`;
  });
  buildPanel(t);
}

buildPanel('2a');
</script>
